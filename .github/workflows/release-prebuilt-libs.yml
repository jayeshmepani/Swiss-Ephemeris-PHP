name: Release Prebuilt Libraries

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential git

      - name: Compile shared library
        run: bash build/compile-linux.sh

      - name: Create release archive
        run: tar -czf build/libswe-linux-x64.tar.gz -C libs/linux-x64 libswe.so

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: libswe-linux-x64
          path: build/libswe-linux-x64.tar.gz
          if-no-files-found: error

  build-linux-arm64:
    name: Build Linux arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential git

      - name: Compile shared library
        run: bash build/compile-linux.sh

      - name: Create release archive
        run: tar -czf build/libswe-linux-arm64.tar.gz -C libs/linux-arm64 libswe.so

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: libswe-linux-arm64
          path: build/libswe-linux-arm64.tar.gz
          if-no-files-found: error

  build-macos-x64:
    name: Build macOS x64
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Compile shared library
        run: bash build/compile-macos.sh

      - name: Create release archive
        run: tar -czf build/libswe-macos-x64.tar.gz -C libs/macos-x64 libswe.dylib

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: libswe-macos-x64
          path: build/libswe-macos-x64.tar.gz
          if-no-files-found: error

  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Compile shared library
        run: bash build/compile-macos.sh

      - name: Create release archive
        run: tar -czf build/libswe-macos-arm64.tar.gz -C libs/macos-arm64 libswe.dylib

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: libswe-macos-arm64
          path: build/libswe-macos-arm64.tar.gz
          if-no-files-found: error

  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 with MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-gcc

      - name: Compile shared library
        shell: pwsh
        run: .\build\compile-windows.ps1

      - name: Create release archive
        shell: pwsh
        run: Compress-Archive -Path libs\windows-x64\swe.dll -DestinationPath build\libswe-windows-x64.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: libswe-windows-x64
          path: build/libswe-windows-x64.zip
          if-no-files-found: error

  upload-release-assets:
    name: Upload Release Assets
    if: github.event_name == 'release'
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-macos-x64
      - build-macos-arm64
      - build-windows-x64
    runs-on: ubuntu-latest
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/libswe-linux-x64.tar.gz
            dist/libswe-linux-arm64.tar.gz
            dist/libswe-macos-x64.tar.gz
            dist/libswe-macos-arm64.tar.gz
            dist/libswe-windows-x64.zip
          fail_on_unmatched_files: true
