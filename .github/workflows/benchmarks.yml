name: Multi-OS Performance Audit

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'docs/benchmark/**'

permissions:
  contents: write

jobs:
  profile:
    name: Profile on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ffi, opcache, fileinfo
          ini-values: ffi.enable=1, opcache.enable_cli=1, opcache.jit=tracing, opcache.jit_buffer_size=100M
          coverage: none

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Set up MSYS2 (Windows Only)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: git mingw-w64-x86_64-gcc

      - name: Compile C-Extension (Multi-Platform)
        shell: bash
        run: |
          git clone --depth 1 -b 4.0.11 https://github.com/kevindecapite/php-sweph.git
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "Building Traditional Windows C-Extension (kevindecapite/php-sweph)..."
            cd php-sweph
            mkdir -p sweph/src
            
            # Fetch fresh swisseph source needed for traditional build
            git clone --depth 1 https://github.com/aloistr/swisseph.git swisseph_tmp
            cp swisseph_tmp/src/*.c sweph/src/ 2>/dev/null || cp swisseph_tmp/*.c sweph/src/ 2>/dev/null || true
            cp swisseph_tmp/src/*.h sweph/src/ 2>/dev/null || cp swisseph_tmp/*.h sweph/src/ 2>/dev/null || true
            
            # Download official PHP Devel Pack for headers and libs
            PHP_VERSION=$(php -r 'echo PHP_VERSION;')
            echo "Targeting PHP Version: $PHP_VERSION"
            curl -L "https://windows.php.net/downloads/releases/php-devel-pack-$PHP_VERSION-Win32-vs16-x64.zip" -o php-devel.zip
            rm -rf php-devel
            mkdir php-devel
            unzip -q php-devel.zip -d php-devel
            
            PHP_H=$(find "$PWD/php-devel" -type f -path "*/include/main/php.h" -print -quit)
            if [ -z "$PHP_H" ]; then
              echo "Could not find php.h in the extracted PHP devel pack"
              find "$PWD/php-devel" -maxdepth 3 -type d -print
              exit 1
            fi
            INC_ROOT=$(cd "$(dirname "$PHP_H")/.." && pwd)
            
            # Determine if PHP is TS or NTS to pick the right .lib
            LIB_FILE=$(find "$PWD/php-devel" -type f \( -name "php8.lib" -o -name "php8ts.lib" \) -print -quit)
            if [ -z "$LIB_FILE" ]; then
              echo "Could not find php8.lib or php8ts.lib in the extracted PHP devel pack"
              find "$PWD/php-devel" -maxdepth 4 -type f -name "*.lib" -print
              exit 1
            fi
            LIB_ROOT=$(dirname "$LIB_FILE")
            LIB_NAME=$(basename "$LIB_FILE" .lib)
            echo "Linking against: $LIB_NAME"
            
            # Compile the traditional extension shim
            gcc -O2 -shared -I. -I"$INC_ROOT" -I"$INC_ROOT/main" -I"$INC_ROOT/TSRM" -I"$INC_ROOT/Zend" -I./sweph/src \
                -DPHP_EXPORTS -DCOMPILE_DL_SWEPHP -DZEND_WIN32 -DPHP_WIN32 \
                swephp.c sweph/src/*.c -o ../docs/benchmark/php_swephp.dll -L"$LIB_ROOT" -l$LIB_NAME
            cd ..
          else
            cd php-sweph && phpize && ./configure && make
          fi

      - name: Run Strict Audit
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            # Load the Windows DLL if it was successfully built
            EXT_PATH="$(pwd)/docs/benchmark/php_swephp.dll"
            if [ -f "$EXT_PATH" ]; then
              php -d extension="$EXT_PATH" docs/benchmark/UltimateBenchmark.php
            else
              php docs/benchmark/UltimateBenchmark.php
            fi
          else
            php -d extension="$(pwd)/php-sweph/modules/swephp.so" docs/benchmark/UltimateBenchmark.php
          fi
          # The file is generated in the root, move it with a unique name
          mv comprehensive_benchmark_stats.json docs/benchmark/${{ matrix.os }}.json

      - name: Upload OS Stats
        uses: actions/upload-artifact@v4
        with:
          name: stats-${{ matrix.os }}
          path: docs/benchmark/${{ matrix.os }}.json

  consolidate:
    name: Generate Master Dashboard
    needs: profile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Download All OS Stats
        uses: actions/download-artifact@v4
        with:
          path: docs/benchmark/
          pattern: stats-*
          merge-multiple: true

      - name: Generate Unified HTML
        run: php docs/benchmark/report_generator.php

      - name: Commit & Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/benchmark/benchmark.html docs/benchmark/*.json
          git commit -m "chore: update multi-os performance audit results [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload Final Audit Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: Full-Multi-OS-Performance-Audit
          path: |
            docs/benchmark/benchmark.html
            docs/benchmark/*.json
